<!DOCTYPE html>
<html>
<head>
  <title>Chess Game - Krishna Shah</title>
    <link rel="stylesheet" href="style.css">

      <!-- Chessboard CSS -->
        <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

            <!-- Font Awesome -->
              <link rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

                  <style>
                      .chess-container {
                            text-align: center;
                                }

                                    #board {
                                          width: 320px;
                                                margin: 20px auto;
                                                      border-radius: 10px;
                                                            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                                                                }

                                                                    .controls {
                                                                          margin-top: 15px;
                                                                              }

                                                                                  .controls button {
                                                                                        margin: 5px;
                                                                                              padding: 10px 15px;
                                                                                                    border: none;
                                                                                                          border-radius: 8px;
                                                                                                                background: #3B82F6;
                                                                                                                      color: white;
                                                                                                                            cursor: pointer;
                                                                                                                                  transition: 0.3s;
                                                                                                                                      }

                                                                                                                                          .controls button:hover {
                                                                                                                                                background: #6C63FF;
                                                                                                                                                    }

                                                                                                                                                        .status {
                                                                                                                                                              margin-top: 15px;
                                                                                                                                                                    font-weight: bold;
                                                                                                                                                                          color: #333;
                                                                                                                                                                              }
                                                                                                                                                                                </style>
                                                                                                                                                                                </head>

                                                                                                                                                                                <body>

                                                                                                                                                                                <header>
                                                                                                                                                                                  <img src="profile.jpg" class="profile-img">
                                                                                                                                                                                    <h1>Krishna Shah</h1>
                                                                                                                                                                                      <p>Play Chess ♟️</p>
                                                                                                                                                                                      </header>

                                                                                                                                                                                      <nav>
                                                                                                                                                                                        <a href="index.html">Home</a>
                                                                                                                                                                                          <a href="about.html">About</a>
                                                                                                                                                                                            <a href="projects.html">Projects</a>
                                                                                                                                                                                              <a href="contact.html">Contact</a>
                                                                                                                                                                                                <a href="chess.html">Chess</a>
                                                                                                                                                                                                </nav>

                                                                                                                                                                                                <section class="chess-container">

                                                                                                                                                                                                  <h2>Chess Game</h2>

                                                                                                                                                                                                    <div id="board"></div>

                                                                                                                                                                                                      <div class="controls">
                                                                                                                                                                                                          <button onclick="resetGame()"><i class="fas fa-rotate"></i> Reset</button>
                                                                                                                                                                                                              <button onclick="setTwoPlayer()"><i class="fas fa-users"></i> 2 Player</button>
                                                                                                                                                                                                                  <button onclick="setComputer()"><i class="fas fa-robot"></i> Vs Computer</button>
                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                      <div class="status" id="status">Game Ready</div>

                                                                                                                                                                                                                      </section>

                                                                                                                                                                                                                      <!-- JS -->
                                                                                                                                                                                                                      <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
                                                                                                                                                                                                                      <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

                                                                                                                                                                                                                      <script>
                                                                                                                                                                                                                        var game = new Chess();
                                                                                                                                                                                                                          var vsComputer = false;

                                                                                                                                                                                                                            var board = Chessboard('board', {
                                                                                                                                                                                                                                draggable: true,
                                                                                                                                                                                                                                    position: 'start',
                                                                                                                                                                                                                                        onDrop: onDrop
                                                                                                                                                                                                                                          });

                                                                                                                                                                                                                                            function onDrop(source, target) {
                                                                                                                                                                                                                                                var move = game.move({
                                                                                                                                                                                                                                                      from: source,
                                                                                                                                                                                                                                                            to: target,
                                                                                                                                                                                                                                                                  promotion: 'q'
                                                                                                                                                                                                                                                                      });

                                                                                                                                                                                                                                                                          if (move === null) return 'snapback';

                                                                                                                                                                                                                                                                              updateStatus();

                                                                                                                                                                                                                                                                                  if (vsComputer) {
                                                                                                                                                                                                                                                                                        window.setTimeout(makeComputerMove, 300);
                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                function resetGame() {
                                                                                                                                                                                                                                                                                                    game.reset();
                                                                                                                                                                                                                                                                                                        board.start();
                                                                                                                                                                                                                                                                                                            document.getElementById("status").innerText = "Game Reset";
                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                function setComputer() {
                                                                                                                                                                                                                                                                                                                    vsComputer = true;
                                                                                                                                                                                                                                                                                                                        document.getElementById("status").innerText = "Playing vs Computer 🤖";
                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                            function setTwoPlayer() {
                                                                                                                                                                                                                                                                                                                                vsComputer = false;
                                                                                                                                                                                                                                                                                                                                    document.getElementById("status").innerText = "2 Player Mode 👥";
                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                        function makeComputerMove() {
                                                                                                                                                                                                                                                                                                                                            var moves = game.moves();

                                                                                                                                                                                                                                                                                                                                                if (moves.length === 0) return;

                                                                                                                                                                                                                                                                                                                                                    var move = moves[Math.floor(Math.random() * moves.length)];
                                                                                                                                                                                                                                                                                                                                                        game.move(move);
                                                                                                                                                                                                                                                                                                                                                            board.position(game.fen());

                                                                                                                                                                                                                                                                                                                                                                updateStatus();
                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                    function updateStatus() {
                                                                                                                                                                                                                                                                                                                                                                        var status = "";

                                                                                                                                                                                                                                                                                                                                                                            if (game.in_checkmate()) {
                                                                                                                                                                                                                                                                                                                                                                                  status = "Checkmate!";
                                                                                                                                                                                                                                                                                                                                                                                      } else if (game.in_draw()) {
                                                                                                                                                                                                                                                                                                                                                                                            status = "Draw!";
                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                      status = (game.turn() === 'w' ? "White" : "Black") + " to move";
                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById("status").innerText = status;
                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                </script>

                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                </html>
